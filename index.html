<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/style.css">
    <script defer src="JS/function.js"></script>
    <title>Calculator</title>
</head>
<body>

<div class="inputContainer">
    <div id="inputBox"></div>
</div>

<div class="container">
    <div style="background-color: darkorange" id="clear" onclick="clearAll()">C</div>
    <div style="background-color: darkorange;" id="delete" onclick="backspace()">⌫</div>
    <div style="background-color: darkkhaki" id="percent" onclick="Percent()">%</div>
    <div style="background-color: darkkhaki" id="divide" onclick="Divide()">÷</div>
    <div id="num7" onclick="addNum(7)">7</div>
    <div id="num8" value="8" onclick="addNum(8)">8</div>
    <div id="num9" value="9" onclick="addNum(9)">9</div>
    <div style="background-color: darkkhaki" id="multiply" onclick="Multiply()">x</div>
    <div id="num4" value="4" onclick="addNum(4)">4</div>
    <div id="num5" value="5" onclick="addNum(5)">5</div>
    <div id="num6" value="6" onclick="addNum(6)">6</div>
    <div style="background-color: darkkhaki" id="subtract" onclick="Subtract()">-</div>
    <div id="num1" value="1" onclick="addNum(1)">1</div>
    <div id="num2" value="2" onclick="addNum(2)">2</div>
    <div id="num3" value="3" onclick="addNum(3)">3</div>
    <div style="background-color: darkkhaki" id="add" onclick="Add()">+</div>
    <div id="num0" value="0" onclick="addNum(0)">0</div>
    <div style="background-color: darkkhaki" id="bracket" onclick="Brackets()">()</div>
    <div style="background-color: darkkhaki" id="comma" onclick="addNum('.')">.</div>
    <div style="background-color: darkkhaki" id="equals" onclick="Pemdas()">=</div>
</div>

</body>
</html>
